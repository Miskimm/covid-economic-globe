<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Results — DECO7180</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #030813;
      --panel: rgba(9,16,30,0.92);
      --line: rgba(255,255,255,0.08);
      --cyan: #68e4ff;
      --mint: #8ff6cc;
      --amber: #ffcb74;
      --red: #ff667f;
      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.52);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 10%, rgba(89,181,255,0.12), transparent 30%),
        linear-gradient(180deg, #091221 0%, #050a13 60%, #03060c 100%);
      color: var(--text);
      font-family: "Avenir Next","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(104,228,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(104,228,255,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      opacity: 0.18;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .topbar-left .eyebrow {
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }
    .topbar-left h1 {
      margin-top: 8px;
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      color: transparent;
      background: linear-gradient(90deg, #eff9ff 0%, var(--cyan) 55%, var(--amber) 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .topbar-left .sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .topbar-right { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 160ms, transform 160ms;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.82; transform: translateY(-1px); }
    .btn-primary {
      background: rgba(104,228,255,0.14);
      border: 1px solid rgba(104,228,255,0.28);
      color: var(--cyan);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }
    .btn-danger {
      background: rgba(255,102,127,0.1);
      border: 1px solid rgba(255,102,127,0.22);
      color: var(--red);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }
    .stat-card {
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }
    .stat-value {
      margin-top: 8px;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-note { margin-top: 6px; font-size: 11px; color: var(--muted); }
    .c-cyan { color: var(--cyan); }
    .c-amber { color: var(--amber); }
    .c-mint { color: var(--mint); }
    .c-red { color: var(--red); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
    }
    .filter-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 160ms;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: rgba(104,228,255,0.3);
      background: rgba(104,228,255,0.1);
      color: var(--cyan);
    }

    /* ── Section heading ── */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 40px 0 20px;
    }
    .section-heading-line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .section-heading-text {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    /* ── Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 18px;
    }
    .cards-grid.full { grid-template-columns: 1fr; }

    /* ── Card ── */
    .card {
      padding: 20px 22px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
    }
    .card-meta {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.32);
    }
    .card-question {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      line-height: 1.45;
    }
    .card-responses {
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }
    .card-body { margin-top: 18px; }

    /* ── Bar chart (CSS) ── */
    .bar-list { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .bar-label-text {
      font-size: 12px;
      color: rgba(255,255,255,0.76);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 600ms cubic-bezier(0.22,1,0.36,1);
    }
    .bar-pct {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
    }
    .bar-count {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    /* ── Scale distribution ── */
    .scale-dist { display: flex; align-items: flex-end; gap: 8px; height: 90px; margin-top: 6px; }
    .scale-col { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
    .scale-bar-track { width: 100%; border-radius: 8px 8px 4px 4px; background: rgba(255,255,255,0.05); display: flex; align-items: flex-end; overflow: hidden; flex: 1; }
    .scale-bar-fill { width: 100%; border-radius: inherit; transition: height 600ms cubic-bezier(0.22,1,0.36,1); }
    .scale-num { font-size: 11px; color: var(--muted); }
    .scale-pct { font-size: 10px; color: rgba(255,255,255,0.6); }
    .scale-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: rgba(255,255,255,0.34); }
    .scale-avg {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .scale-avg-label { font-size: 11px; color: var(--muted); }
    .scale-avg-val { font-size: 22px; font-weight: 700; }
    .scale-avg-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .scale-avg-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--amber));
    }

    /* ── Donut ── */
    .donut-wrap { display: grid; grid-template-columns: 160px 1fr; gap: 20px; align-items: center; }
    .donut-canvas-wrap { position: relative; width: 140px; height: 140px; }
    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .donut-center-num { font-size: 26px; font-weight: 700; color: var(--cyan); }
    .donut-center-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .donut-legend { display: flex; flex-direction: column; gap: 8px; }
    .donut-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.76); }
    .donut-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .donut-legend-pct { margin-left: auto; font-weight: 700; color: rgba(255,255,255,0.9); }

    /* ── Text responses ── */
    .text-list { display: flex; flex-direction: column; gap: 8px; }
    .text-item {
      padding: 10px 14px;
      border-radius: 12px;
      border-left: 3px solid rgba(104,228,255,0.3);
      background: rgba(255,255,255,0.03);
      font-size: 13px;
      color: rgba(255,255,255,0.78);
      line-height: 1.55;
    }
    .text-empty { font-size: 12px; color: rgba(255,255,255,0.28); font-style: italic; }

    /* ── No data screen ── */
    .no-data {
      text-align: center;
      padding: 80px 24px;
    }
    .no-data-icon {
      font-size: 48px;
      opacity: 0.3;
      margin-bottom: 18px;
    }
    .no-data-title { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5); }
    .no-data-sub { margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.3); }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 160ms;
    }
    .back-link:hover { color: var(--cyan); }

    @media (max-width: 720px) {
      .cards-grid { grid-template-columns: 1fr; }
      .donut-wrap { grid-template-columns: 1fr; }
      .donut-canvas-wrap { margin: 0 auto; }
    }
  </style>
</head>
<body>
<div class="page">

  <a class="back-link" href="index.html">← Back to Prototype</a>

  <div class="topbar">
    <div class="topbar-left">
      <div class="eyebrow">DECO7180 — Research Tool</div>
      <h1>Survey Results</h1>
      <p class="sub" id="subLine">Loading responses…</p>
      <p class="sub" id="sourceTag" style="margin-top:4px;font-size:11px"></p>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="exportJSON()">⬇ Export JSON</button>
      <button class="btn btn-danger" onclick="clearData()">✕ Clear All Data</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter by Prototype</span>
    <button class="filter-btn active" data-proto="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-proto="1" onclick="setFilter('1', this)">Prototype 1</button>
    <button class="filter-btn" data-proto="2" onclick="setFilter('2', this)">Prototype 2</button>
    <button class="filter-btn" data-proto="3" onclick="setFilter('3', this)">Prototype 3</button>
    <button class="filter-btn" data-proto="4" onclick="setFilter('4', this)">Prototype 4</button>
  </div>

  <div id="main"></div>

</div>

<script>
const STORAGE_KEY = 'deco7180_research_responses';

const PALETTE = ['#68e4ff','#ffcb74','#8ff6cc','#ff667f','#a78bfa','#fb923c','#34d399','#f472b6'];

const DEFS = [
  // ── Step 1
  { section: 'Step 1 — Prototype Identity', id: 'prototype_id', q: 'Which prototype did you test?', type: 'donut',
    options: { '1':'Prototype 1','2':'Prototype 2','3':'Prototype 3','4':'Prototype 4 (this)' } },
  { id: 'time_spent', q: 'How long did you spend with the prototype?', type: 'bar',
    options: { 'under5':'Under 5 min','5to10':'5–10 min','10to20':'10–20 min','over20':'20+ min' } },

  // ── Step 2
  { section: 'Step 2 — Data Visualisation Preference', id: 'viz_preference', q: 'Preferred visualisation type?', type: 'bar',
    options: { '3d_globe':'3D Globe','2d_map':'2D Flat Map','charts':'Charts/Graphs','dashboard':'Dashboard','other':'Other' } },
  { id: 'data_mode', q: 'Daily changes vs cumulative totals?', type: 'donut',
    options: { 'daily':'Daily / dynamic','cumulative':'Cumulative totals','both':'Both, switchable' } },
  { id: 'useful_data', q: 'Which data points are most useful? (multi-select)', type: 'bar', multi: true,
    options: { 'cases':'COVID cases','deaths':'Deaths','gdp_shock':'GDP shock','recovery':'Recovery rate','correlation':'Health–economy link' } },
  { id: 'link_clarity', q: 'Clarity of health–economy link', type: 'scale', min: 1, max: 5,
    minLabel: 'Not clear at all', maxLabel: 'Very clear', color: '#68e4ff' },

  // ── Step 3
  { section: 'Step 3 — Usability & Interface Control', id: 'find_country', q: 'Ease of finding a specific country', type: 'scale', min: 1, max: 5,
    minLabel: 'Very difficult', maxLabel: 'Very easy', color: '#ffcb74' },
  { id: 'globe_helped', q: 'Did the 3D rotating globe help your understanding?', type: 'bar',
    options: { 'yes':'Yes — clearer','neutral':'Neutral','no':'No — harder to focus','dizzying':'Caused distraction/discomfort' } },
  { id: 'interface_control', q: 'Sense of interface control', type: 'scale', min: 1, max: 5,
    minLabel: 'No control', maxLabel: 'Full control', color: '#8ff6cc' },
  { id: 'interaction_fatigue', q: 'Interaction fatigue experienced?', type: 'donut',
    options: { 'no':'No — smooth & natural','slight':'Slight fatigue','yes':'Yes — wanted to stop' } },

  // ── Step 4
  { section: 'Step 4 — Data Precision & Trust', id: 'data_trust', q: 'Data trustworthiness', type: 'scale', min: 1, max: 5,
    minLabel: 'Do not trust', maxLabel: 'Fully trust', color: '#a78bfa' },
  { id: 'data_precision', q: 'Data precision (real-world representation)', type: 'scale', min: 1, max: 5,
    minLabel: 'Very imprecise', maxLabel: 'Very precise', color: '#68e4ff' },
  { id: 'micro_macro', q: 'Did it show both global & country-level impacts?', type: 'bar',
    options: { 'both':'Both clear','macro_only':'Mostly global, hard to zoom','micro_only':'Mostly country, hard to see global','neither':'Neither clear' } },

  // ── Step 5
  { section: 'Step 5 — Overall Impression', id: 'overall_rating', q: 'Overall rating of prototype effectiveness', type: 'scale', min: 1, max: 5,
    minLabel: 'Poor', maxLabel: 'Excellent', color: '#ffcb74' },
  { id: 'most_valuable', q: 'Most valuable / impressive aspect', type: 'text' },
  { id: 'biggest_improvement', q: 'Single most important improvement', type: 'text' },
  { id: 'other_comments', q: 'Other comments or observations', type: 'text' },
];

let allData = [];
let filtered = [];
let currentFilter = 'all';
const chartInstances = {};

async function load() {
  try {
    const res = await fetch('/api/responses');
    if (!res.ok) throw new Error();
    allData = await res.json();
    // 同步到 localStorage 作为备用
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    document.getElementById('sourceTag').textContent = '● 数据来源：responses.json 文件';
    document.getElementById('sourceTag').style.color = '#8ff6cc';
  } catch {
    // 服务器未启动，从 localStorage 读取
    allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    document.getElementById('sourceTag').textContent = '● 数据来源：浏览器缓存（运行 node server.js 可持久化到文件）';
    document.getElementById('sourceTag').style.color = '#ffcb74';
  }
  applyFilter(currentFilter);
}

function setFilter(proto, btn) {
  currentFilter = proto;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(proto);
}

function applyFilter(proto) {
  filtered = proto === 'all' ? allData : allData.filter(r => r.prototype_id === proto);
  render();
}

function render() {
  const n = filtered.length;
  document.getElementById('subLine').textContent =
    n === 0 ? 'No responses yet — complete a survey to see results here.'
            : `${n} response${n === 1 ? '' : 's'} collected`;

  renderStats();
  renderMain();
}

function renderStats() {
  const n = filtered.length;
  const ratings = filtered.map(r => r.overall_rating).filter(Boolean);
  const avg = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : '—';
  const trusts = filtered.map(r => r.data_trust).filter(Boolean);
  const avgTrust = trusts.length ? (trusts.reduce((a,b)=>a+b,0)/trusts.length).toFixed(1) : '—';
  const controls = filtered.map(r => r.interface_control).filter(Boolean);
  const avgCtrl = controls.length ? (controls.reduce((a,b)=>a+b,0)/controls.length).toFixed(1) : '—';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Responses</div>
      <div class="stat-value c-cyan">${n}</div>
      <div class="stat-note">All prototypes combined</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Overall Rating</div>
      <div class="stat-value c-amber">${avg}<span style="font-size:16px;opacity:.5"> /5</span></div>
      <div class="stat-note">Prototype effectiveness</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Data Trust</div>
      <div class="stat-value c-mint">${avgTrust}<span style="font-size:16px;opacity:.5"> /5</span></div>
      <div class="stat-note">Credibility score</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Interface Control</div>
      <div class="stat-value c-cyan">${avgCtrl}<span style="font-size:16px;opacity:.5"> /5</span></div>
      <div class="stat-note">User control perception</div>
    </div>
  `;
}

function renderMain() {
  const main = document.getElementById('main');
  if (filtered.length === 0) {
    main.innerHTML = `<div class="no-data"><div class="no-data-icon">📊</div><div class="no-data-title">No responses yet</div><div class="no-data-sub">Ask participants to complete the survey on the prototype page, then come back here.</div></div>`;
    return;
  }

  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);

  let html = '';
  let openGrid = false;
  let qIndex = 0;

  DEFS.forEach((def, i) => {
    if (def.section) {
      if (openGrid) { html += '</div>'; openGrid = false; }
      html += `<div class="section-heading"><div class="section-heading-line"></div><div class="section-heading-text">${def.section}</div><div class="section-heading-line"></div></div>`;
    }

    const isText = def.type === 'text';
    if (!openGrid) {
      html += `<div class="cards-grid${isText ? ' full' : ''}">`;
      openGrid = true;
    } else if (isText) {
      html += `</div><div class="cards-grid full">`;
    }

    qIndex++;
    html += buildCard(def, qIndex);
  });

  if (openGrid) html += '</div>';
  main.innerHTML = html;

  // Init charts after DOM is ready
  DEFS.forEach((def, i) => {
    if (def.type === 'donut') initDonut(def);
  });
}

function buildCard(def, qIndex) {
  const n = filtered.length;
  const nAnswered = filtered.filter(r => r[def.id] !== undefined && r[def.id] !== '').length;

  let body = '';

  if (def.type === 'bar') {
    const counts = {};
    Object.keys(def.options).forEach(k => counts[k] = 0);
    filtered.forEach(r => {
      const val = r[def.id];
      if (!val) return;
      if (def.multi && Array.isArray(val)) val.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
      else if (counts[val] !== undefined) counts[val]++;
    });
    const denom = def.multi ? nAnswered : nAnswered;
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const max = Math.max(...sorted.map(([,c])=>c), 1);
    const colors = PALETTE;
    body = `<div class="bar-list">${sorted.map(([k,c], ci) => {
      const pct = denom > 0 ? Math.round((c / denom) * 100) : 0;
      const w = Math.round((c / max) * 100);
      return `<div>
        <div class="bar-label-text">${def.options[k]}</div>
        <div class="bar-row">
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${colors[ci % colors.length]};opacity:0.82"></div></div>
          <div><div class="bar-pct">${pct}%</div><div class="bar-count">${c} / ${denom}</div></div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  else if (def.type === 'scale') {
    const dist = {};
    for (let v = def.min; v <= def.max; v++) dist[v] = 0;
    let sum = 0, cnt = 0;
    filtered.forEach(r => {
      const v = r[def.id];
      if (v != null) { dist[v] = (dist[v] || 0) + 1; sum += v; cnt++; }
    });
    const avg = cnt ? (sum / cnt).toFixed(2) : '—';
    const maxCount = Math.max(...Object.values(dist), 1);
    const cols = Object.entries(dist).map(([v, c]) => {
      const pct = nAnswered > 0 ? Math.round((c / nAnswered) * 100) : 0;
      const h = Math.round((c / maxCount) * 100);
      return `<div class="scale-col">
        <div class="scale-pct">${pct > 0 ? pct + '%' : ''}</div>
        <div class="scale-bar-track" style="height:70px">
          <div class="scale-bar-fill" style="height:${h}%;background:${def.color || '#68e4ff'};opacity:0.8"></div>
        </div>
        <div class="scale-num">${v}</div>
      </div>`;
    }).join('');
    const avgPct = cnt ? ((parseFloat(avg) - def.min) / (def.max - def.min)) * 100 : 0;
    body = `
      <div class="scale-dist">${cols}</div>
      <div class="scale-labels"><span>${def.minLabel}</span><span>${def.maxLabel}</span></div>
      <div class="scale-avg">
        <div class="scale-avg-label">Average</div>
        <div class="scale-avg-val" style="color:${def.color || '#68e4ff'}">${avg}</div>
        <div class="scale-avg-bar"><div class="scale-avg-fill" style="width:${avgPct}%"></div></div>
        <div style="font-size:12px;color:var(--muted)">/ ${def.max}</div>
      </div>`;
  }

  else if (def.type === 'donut') {
    body = `<div class="donut-wrap">
      <div class="donut-canvas-wrap">
        <canvas id="donut_${def.id}" width="140" height="140"></canvas>
        <div class="donut-center">
          <div class="donut-center-num">${nAnswered}</div>
          <div class="donut-center-label">responses</div>
        </div>
      </div>
      <div class="donut-legend" id="legend_${def.id}"></div>
    </div>`;
  }

  else if (def.type === 'text') {
    const texts = filtered.map(r => r[def.id]).filter(t => t && t.trim());
    body = texts.length
      ? `<div class="text-list">${texts.map(t => `<div class="text-item">${escHtml(t)}</div>`).join('')}</div>`
      : `<div class="text-empty">No responses yet.</div>`;
  }

  return `<div class="card">
    <div class="card-meta">Q${qIndex}</div>
    <div class="card-question">${def.q}</div>
    <div class="card-responses">${nAnswered} response${nAnswered !== 1 ? 's' : ''}</div>
    <div class="card-body">${body}</div>
  </div>`;
}

function initDonut(def) {
  const canvas = document.getElementById(`donut_${def.id}`);
  const legendEl = document.getElementById(`legend_${def.id}`);
  if (!canvas) return;

  const counts = {};
  Object.keys(def.options).forEach(k => counts[k] = 0);
  filtered.forEach(r => {
    const v = r[def.id];
    if (v && counts[v] !== undefined) counts[v]++;
  });

  const labels = Object.keys(def.options);
  const data = labels.map(k => counts[k]);
  const total = data.reduce((a,b) => a+b, 0);

  if (chartInstances[def.id]) chartInstances[def.id].destroy();

  chartInstances[def.id] = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: PALETTE.map(c => c + 'cc'), borderColor: PALETTE, borderWidth: 2, hoverOffset: 6 }]
    },
    options: {
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: ctx => ` ${def.options[ctx.label]}: ${ctx.parsed} (${total > 0 ? Math.round(ctx.parsed/total*100) : 0}%)`
      }}},
      animation: { duration: 600 }
    }
  });

  legendEl.innerHTML = labels.map((k, i) => {
    const pct = total > 0 ? Math.round(counts[k] / total * 100) : 0;
    return `<div class="donut-legend-item">
      <div class="donut-dot" style="background:${PALETTE[i % PALETTE.length]}"></div>
      <span>${def.options[k]}</span>
      <span class="donut-legend-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `deco7180_responses_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function clearData() {
  if (!confirm('Clear ALL survey responses? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  try {
    await fetch('/api/clear', { method: 'POST' });
  } catch {}
  allData = []; filtered = [];
  render();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
